backtest:
  start_time: "2020-01-01"
  end_time: null            # dynamique : today en production
  mode: "live"              # basculer sur "backtest" pour évaluation historique
  initial_capital: 100.0    # base indice pour comparaison normalisée
  risk_free_rate: 0.02
  trading_days_year: 252

transaction:
  open_cost: 0.0005
  close_cost: 0.0015
  min_cost: 0.0

strategy:
  method: "topk"
  target_cluster: 3
  proba_threshold: 0.55
  weight_bounds: [0.02, 0.25]
  lookback_days: 252
  feature_cols:
    - rsi
    - macd
    - bb_low
    - bb_high
    - atr
    - return_2m
    - return_3m
    - return_6m
    - euro_volume_lag1
    - garman_klass_vol_lag1
    - Mkt-RF_lag1
    - SMB_lag1
    - HML_lag1
    - RMW_lag1
    - CMA_lag1
    - cluster

benchmark:
  ticker: "^FCHI"           # CAC40

pipeline:
  run_daily: true
  rebalance_frequency: "monthly"   # le backtest rebalance mensuellement
  signal_cache: true
